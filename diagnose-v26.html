<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta http-equiv="Cache-Control" content="no-store"><title>RICE NAVI v26 診断</title><style>body{font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:20px;background:#f7fbff;color:#00224a}.box{background:#fff;border-radius:18px;padding:20px;margin:12px 0;box-shadow:0 6px 22px rgba(20,80,140,.08)}.ok{color:#087a2e}.ng{color:#b00020}.log{white-space:pre-wrap;background:#eef6ff;border-radius:12px;padding:12px}a,button{font-weight:800}</style></head><body><h1>RICE NAVI v26 診断</h1><div class="box"><p>このページが表示されれば、少なくとも新しいv26ファイルの一部はGitHubに届いています。</p><p><a href="./index.html?v=26&from=diag">通常起動</a> / <a href="./index-v26.html?v=26&from=diag">v26直接起動</a> / <a href="./reset.html?v=26&from=diag">初期化ページ</a></p></div><div class="box"><h2>読込テスト</h2><div id="out" class="log">開始前</div></div><script>
const files=['version.txt','index.html?v=26','styles.css?v=26','manifest.webmanifest?v=26','data/rice_navi_data_v26.json?v=26','data/rice_varieties/rice_navi_rice_varieties_ja_LATEST.json?v=26','data/world_rice_rankings/rice_navi_world_rice_rankings_master_v1_multilingual.json?v=26','data/jp_reading_corner/rice_navi_jp_reading_corner_yoneshoten.json?v=26'];
const out=document.getElementById('out');
async function run(){out.textContent='診断開始\n'; for(const f of files){try{const r=await fetch(f,{cache:'no-store'}); const t=await r.text(); out.textContent += (r.ok?'✅ ':'❌ ')+f+' status='+r.status+' size='+t.length+'\n'; if(f.endsWith('.json?v=26')||f.includes('.json?')){JSON.parse(t); out.textContent+='   JSON OK\n';}}catch(e){out.textContent+='❌ '+f+' '+(e.message||e)+'\n';}} if('serviceWorker' in navigator){const regs=await navigator.serviceWorker.getRegistrations(); out.textContent+='ServiceWorker registrations='+regs.length+'\n';} if('caches' in window){const keys=await caches.keys(); out.textContent+='CacheStorage keys='+keys.length+'\n';}}
run();
</script></body></html>
