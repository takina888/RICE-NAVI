<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0b6fd3">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>RICE NAVI v19</title>
  <link rel="icon" href="assets/icon-192.png?v=19">
  <link rel="manifest" href="manifest.webmanifest?v=19">
  <link rel="stylesheet" href="styles.css?v=19">
</head>
<body>
  <div id="app"><div class="boot">RICE NAVIを読み込み中...</div></div>
  <script>
    window.RICE_NAVI_VERSION = 'v19-cache-reset';
    (async function(){
      try{
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(r => r.unregister()));
        }
        if ('caches' in window) {
          const names = await caches.keys();
          await Promise.all(names.map(n => caches.delete(n)));
        }
      } catch(e) { console.warn('cache reset skipped', e); }
      setTimeout(function(){
        if(!window.RICE_NAVI_APP_STARTED){
          var el=document.getElementById('app');
          if(el){el.innerHTML='<div class="app"><div class="header"><div class="brand">RICE NAVI</div></div><div class="error"><h2>読み込みが止まっています</h2><p>古いキャッシュ、または app.js / data フォルダの配置違いの可能性があります。</p><p>GitHub Pagesでは index.html / app.js / styles.css / assets / data を同じ階層に置いてください。</p><p><a href="reset.html?v=19">キャッシュ初期化ページを開く</a></p></div></div>'}
        }
      }, 9000);
    })();
  </script>
  <script src="app.js?v=19"></script>
</body>
</html>
