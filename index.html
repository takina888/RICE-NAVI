<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0b6fd3">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>RICE NAVI</title>
  <!-- RICE NAVI v24 full double-check package -->
  <link rel="icon" href="assets/icon-192.png?v=24">
  <link rel="manifest" href="manifest.webmanifest?v=24">
  <link rel="stylesheet" href="styles.css?v=24">
  <style>
    .boot{max-width:720px;margin:56px auto;padding:28px;border-radius:22px;background:#fff;box-shadow:0 8px 28px rgba(20,80,140,.08);font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#00224a}
    .boot-title{font-size:28px;font-weight:800;margin-bottom:12px}.boot-note{background:#eef6ff;border-radius:14px;padding:14px;margin-top:14px}.boot-error{display:none;background:#fff3f3;color:#7a1111;border-radius:14px;padding:14px;margin-top:14px}.boot a{color:#0b6fd3;font-weight:700}
  </style>
</head>
<body>
  <div id="app">
    <div class="boot">
      <div class="boot-title">RICE NAVI</div>
      <div class="boot-note">起動しています。初回はデータ確認のため少し時間がかかる場合があります。</div>
      <div id="bootError" class="boot-error">
        起動に時間がかかっています。GitHubに <b>index.html / app.js / styles.css / assets / data</b> が同じ階層で置かれているか確認してください。<br>
        古い画面が残る場合は <a href="reset.html?v=24">キャッシュ初期化ページ</a> を開いてください。
      </div>
    </div>
  </div>
  <script>
    window.RICE_NAVI_VERSION = 'v24';
    window.RICE_NAVI_CACHE_BUST = '24';
    (function(){
      try{
        if('serviceWorker' in navigator){
          navigator.serviceWorker.getRegistrations()
            .then(function(regs){ return Promise.all(regs.map(function(r){ return r.unregister(); })); })
            .catch(function(){});
        }
        if('caches' in window){
          caches.keys()
            .then(function(names){ return Promise.all(names.map(function(n){ return caches.delete(n); })); })
            .catch(function(){});
        }
      }catch(e){}
      setTimeout(function(){
        if(!window.RICE_NAVI_APP_STARTED){
          var el=document.getElementById('bootError');
          if(el) el.style.display='block';
        }
      },9000);
    })();
  </script>
  <script src="app.js?v=24"></script>
</body>
</html>
