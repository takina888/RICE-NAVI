<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>RICE NAVI v31</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header class="topbar">
  <div class="brand"><img src="assets/RICE_NAVI_RN_icon.png" alt="RN"><div><b>RICE NAVI</b><span>炊飯・米・水・保管を根拠から見る</span></div></div>
  <select id="lang" aria-label="language"><option value="ja">日本語</option><option value="en">English</option><option value="zh_tw">繁體中文</option><option value="zh_cn">简体中文</option></select>
</header>
<main>
  <section id="home" class="view active"></section>
  <section id="learn" class="view"></section>
  <section id="literature" class="view"></section>
  <section id="varieties" class="view"></section>
  <section id="check" class="view"></section>
  <section id="future" class="view"></section>
  <section id="rankings" class="view"></section>
  <section id="detail" class="view"></section>
</main>
<nav class="bottomnav">
  <button data-view="home" class="active">ホーム</button>
  <button data-view="learn">学ぶ</button>
  <button data-view="literature">文献</button>
  <button data-view="varieties">図鑑</button>
  <button data-view="check">チェック</button>
  <button data-view="future">未来</button>
  <button data-view="rankings">ランキング</button>
</nav>
<script src="app.js"></script>
</body>
</html>
