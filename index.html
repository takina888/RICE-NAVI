<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b74e8">
  <title>RICE NAVI</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="phone-shell">
    <header class="app-header">
      <div class="top-row">
        <div class="brand">
          <img src="assets/rice_navi_rn_logo.png" alt="RICE NAVI" class="brand-logo">
          <div>
            <h1>RICE NAVI</h1>
            <p>米を楽しく知り、文献で学び、現場で確認する</p>
          </div>
        </div>
        <button class="icon-button" id="searchToggle" aria-label="検索">⌕</button>
      </div>
      <div class="search-row" id="searchRow">
        <input id="searchInput" type="search" placeholder="キーワードで探す：吸水、糊化、芯残り…" aria-label="検索">
        <select id="languageSelect" aria-label="表示言語">
          <option value="ja">日本語</option>
          <option value="en">English β</option>
          <option value="zh_tw">繁體 β</option>
          <option value="zh_cn">简体 β</option>
        </select>
      </div>
    </header>

    <main id="app" class="app-main">
      <section class="loading-card">読み込み中...</section>
    </main>

    <nav class="bottom-nav" aria-label="下部ナビゲーション">
      <button data-view="home" class="active"><span>⌂</span><b>ホーム</b></button>
      <button data-view="meister"><span>▦</span><b>学ぶ</b></button>
      <button data-view="library"><span>▣</span><b>文献</b></button>
      <button data-view="checks"><span>✓</span><b>チェック</b></button>
      <button data-view="status"><span>RN</span><b>状況</b></button>
    </nav>
  </div>
  <script src="app.js"></script>
</body>
</html>
