<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0b6fd3">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>RICE NAVI v22</title>
  <link rel="icon" href="assets/icon-192.png?v=22">
  <link rel="manifest" href="manifest.webmanifest?v=22">
  <link rel="stylesheet" href="styles.css?v=22">
</head>
<body>
  <div id="app"><div class="boot">RICE NAVIを読み込み中...</div></div>
  <script>
    window.RICE_NAVI_VERSION = 'v22';
    (function(){
      try{
        if('serviceWorker' in navigator){
          navigator.serviceWorker.getRegistrations().then(function(regs){
            return Promise.all(regs.map(function(r){return r.unregister();}));
          }).catch(function(){});
        }
        if('caches' in window){
          caches.keys().then(function(names){
            return Promise.all(names.map(function(n){return caches.delete(n);}));
          }).catch(function(){});
        }
      }catch(e){}
    })();
  </script>
  <script src="app.js?v=22"></script>
</body>
</html>
