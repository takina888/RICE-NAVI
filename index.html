<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b74c8">
  <title>RICE NAVI</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header">
    <div class="brand-row">
      <img src="assets/rice_navi_rn_logo.png" alt="RICE NAVI RN logo" class="logo">
      <div>
        <h1>RICE NAVI</h1>
        <p id="subtitle">炊飯を学ぶ・調べる・確認する</p>
      </div>
    </div>
    <div class="toolbar">
      <select id="languageSelect" aria-label="Language">
        <option value="ja">日本語</option>
        <option value="en">English</option>
        <option value="zh_tw">繁體中文</option>
        <option value="zh_cn">简体中文</option>
      </select>
      <input id="searchInput" type="search" placeholder="カード検索" aria-label="Search">
    </div>
  </header>

  <nav id="menu" class="menu" aria-label="RICE NAVI menu"></nav>

  <main id="app" class="app-main">
    <section class="panel"><h2>読み込み中...</h2></section>
  </main>

  <footer class="footer">
    <span>RICE NAVI v5 translation deep-check package</span>
    <span id="loadStatus"></span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
