<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>RICE NAVI cache reset</title><style>body{font-family:system-ui,-apple-system,sans-serif;margin:24px;background:#f7fbff;color:#102033}.box{max-width:680px;margin:auto;background:#fff;padding:20px;border-radius:18px;box-shadow:0 8px 24px #0001}button,a{display:inline-block;background:#0b6fd3;color:#fff;padding:12px 16px;border-radius:12px;text-decoration:none;border:0;font-weight:700}.log{white-space:pre-wrap;background:#eef6ff;padding:12px;border-radius:12px;margin-top:12px}</style></head><body><div class="box"><h1>RICE NAVI キャッシュ初期化</h1><p>古い画面が残る場合、このページでService Workerとブラウザキャッシュを解除します。</p><button onclick="resetNow()">初期化してRICE NAVIを開く</button><div id="log" class="log">待機中</div></div><script>
async function resetNow(){const log=document.getElementById('log');const say=t=>log.textContent+='
'+t;log.textContent='初期化開始';try{if('serviceWorker'in navigator){const regs=await navigator.serviceWorker.getRegistrations();say('Service Worker: '+regs.length+'件');for(const r of regs){await r.unregister();}}else say('Service Workerなし');if('caches'in window){const names=await caches.keys();say('Cache: '+names.length+'件');for(const n of names){await caches.delete(n);}}else say('Cache APIなし');say('完了。開き直します。');setTimeout(()=>location.href='index.html?v=19&reset=' + Date.now(),700);}catch(e){say('エラー: '+e.message);}}
resetNow();</script></body></html>
